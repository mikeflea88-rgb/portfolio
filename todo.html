<script>
let tasks = JSON.parse(localStorage.getItem('terrorTasks')) || [];

function addTask(){
  let task = document.getElementById('task').value;
  if(task){
    tasks.push(task);
    saveTasks();
    updateList();
    document.getElementById('task').value = '';
  }
}

function deleteTask(index){
  tasks.splice(index, 1);
  saveTasks();
  updateList();
}

function saveTasks(){
  localStorage.setItem('terrorTasks', JSON.stringify(tasks));
}

function updateList(){
  let list = document.getElementById('list');
  list.innerHTML = '';
  tasks.forEach((t, i) => {
    list.innerHTML += `<div class="task">${t}<button class="delete" onclick="deleteTask(${i})">X</button></div>`;
  });
  document.getElementById('count').textContent = tasks.length;
}

// LOAD TASKS WHEN PAGE OPEN
updateList();
</script>
