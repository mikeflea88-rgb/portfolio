<!DOCTYPE html>
<html>
<head>
<title>TERROR Expense Tracker</title>
<style>
body{background:#000; color:#00ff88; font-family:sans-serif; text-align:center; padding:40px}
input,button{padding:12px; margin:5px; background:#111; color:#00ff88; border:2px solid #00ff88; border-radius:8px; font-size:16px}
button{background:#00ff88; color:#000; font-weight:bold; cursor:pointer}
#list{margin-top:30px; text-align:left; max-width:400px; margin-left:auto; margin-right:auto}
.item{padding:10px; border-bottom:1px solid #00ff88; margin:5px 0}
h1{color:#00ff88}
</style>
</head>
<body>
<h1>TERROR EXPENSE TRACKER</h1>
<input type="text" id="item" placeholder="What you buy? e.g Food">
<input type="number" id="amount" placeholder="How much? e.g 50">
<button onclick="addExpense()">Add Expense</button>

<div id="list"></div>
<h2>Total Spent: $<span id="total">0</span></h2>

<script>
let expenses = [];
function addExpense(){
  let item = document.getElementById('item').value;
  let amount = parseFloat(document.getElementById('amount').value);
  if(item && amount){
    expenses.push({item, amount});
    updateList();
    document.getElementById('item').value = '';
    document.getElementById('amount').value = '';
  }
}
function updateList(){
  let list = document.getElementById('list');
  let total = 0;
  list.innerHTML = '';
  expenses.forEach(e => {
    list.innerHTML += `<div class="item">${e.item}: $${e.amount}</div>`;
    total += e.amount;
  });
  document.getElementById('total').textContent = total;
}
</script>
</body>
</html>
